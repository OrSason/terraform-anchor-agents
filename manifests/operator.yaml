apiVersion: v1
kind: Namespace
metadata:
  name: anchor-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anchor-agent-operator
  namespace: anchor-system
  labels:
    app.kubernetes.io/name: anchor-agent-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: anchor-agent-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anchor-agent-operator
    spec:
      serviceAccountName: anchor-agent-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: ghcr.io/orsason/anchor-agent-operator:latest
          imagePullPolicy: Always
          env:
            # Empty = watch all namespaces. Set to scope to one namespace.
            - name: WATCH_NAMESPACE
              value: ""
            - name: RECONCILE_INTERVAL_MS
              value: "15000"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 192Mi
